name: Deploy Dockerized App to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Log in to Docker Hub using PAT
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_ACCESS_TOKEN }}

      # 3. Build and push Docker image with build-time environment variables
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/sanjib-academy:latest
          build-args: |
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            BETTER_AUTH_URL=${{ secrets.BETTER_AUTH_URL }}
            BETTER_AUTH_SECRET=${{ secrets.BETTER_AUTH_SECRET }}
            VITE_APP_HOST=${{ secrets.VITE_APP_HOST }}

      # 4. SSH into VPS and deploy
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            # Pull the latest image
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/sanjib-academy:latest
            # Stop and remove any existing container
            docker rm -f sanjib-academy || true
            # Run the container with environment variables
            docker run -d \
              --name sanjib-academy \
              -p 5000:3000 \
              -e DATABASE_URL=${{ secrets.DATABASE_URL }} \
              -e GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }} \
              -e GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }} \
              -e BETTER_AUTH_URL=${{ secrets.BETTER_AUTH_URL }} \
              -e BETTER_AUTH_SECRET=${{ secrets.BETTER_AUTH_SECRET }} \
              -e VITE_APP_HOST=${{ secrets.VITE_APP_HOST }} \
              ${{ secrets.DOCKERHUB_USERNAME }}/sanjib-academy:latest
