name: sanjib-academy-dev

networks:
  sanjib-academy-dev:
    driver: bridge

services:
  sanjib-academy-dev-database:
    container_name: sanjib-academy-dev-database
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: password
    ports:
      - 3305:3306
    networks:
      - sanjib-academy-dev

  sanjib-academy-dev-cache:
    container_name: sanjib-academy-dev-cache
    image: redis/redis-stack:7.4.0-v8
    ports:
      - 6379:6379
      - 8001:8001
    networks:
      - sanjib-academy-dev
